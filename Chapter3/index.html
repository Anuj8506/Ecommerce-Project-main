<!DOCTYPE html>
<html>

<head>
    <title>ChatBot</title>
</head>

<body>
    <div class="js-Container"></div>


    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script> 
    <script type="text/babel">

        function Chat_bot( { chatMessages , setChatMessage } ) {
            const [ inputText , setInputText ] = React.useState('');

            function saveInputText(event){
                setInputText(event.target.value);  // “Give me the current value of the element that fired this event.

            }

            function sendMessage(){
               const newChatMessages = [
                    ...chatMessages,
                    {
                        msg: inputText,
                        sender: 'User',
                        id: crypto.randomUUID()
                    }
                ];

                setChatMessage(newChatMessages);

                const response = Chatbot.getResponse( inputText );
                setChatMessage([
                    ...newChatMessages,
                    {
                        msg: response,
                        sender: 'Robot',
                        id: crypto.randomUUID()
                    }
                ]);


                setInputText('');
            }

            return (
                <>
                    <input
                        placeholder = "Send a message to ChatBot"
                        size = "30"
                        onChange={ saveInputText }
                        value = { inputText }  //controlled input
                    />
                    <button
                      onClick = { sendMessage }
                    >Send</button>
                </>
            );
        }

        function Chat_Message({ msg, sender }) {
            return (
                <div>
                    {sender === 'User' && <img src="User.png" width="50" />}
                    {msg}
                    {sender === 'Robot' && <img src="robot.png" width="50" />}
                </div>
            );
        }
        
        function Chat_Messages( { chatMessages } ) {
            return (
                <>
                    {chatMessages.map((Chat_Msg) => {
                        return (
                            <Chat_Message
                                msg={Chat_Msg.msg}
                                sender={Chat_Msg.sender}
                                key={Chat_Msg.id}
                            />   
                            );
                        })
                    }
                </>
            )
        }

        function App() {
             const [ chatMessages , setChatMessage ] = React.useState([  // useState return an array of [ state , setState ]
                {                           // here State contain itself an array of message                         
                    msg: 'Hello ChatBot',   // so what chatFirst contain is an array itself 
                    sender: 'User',
                    id:'id1'
                },
                {
                    msg: 'Hello! How can i help you?',
                    sender: 'Robot',
                    id:'id2'
                },
                {
                    msg: 'Can you tell me todays date?',
                    sender: 'User',
                    id:'id3'
                },
                {
                    msg: 'Ohh! Its 22 August.',
                    sender: 'Robot',
                    id:'id4'
                }
            ]);
            return (
                <>
                    <Chat_bot
                       chatMessages={ chatMessages}
                       setChatMessage= { setChatMessage }
                    />
                    <Chat_Messages 
                       chatMessages = { chatMessages }
                       setChatMessage = { setChatMessage }
                    />          
                </>
            );
        }

        const box = document.querySelector('.js-Container');
        ReactDOM.createRoot(box).render(<App />);
    </script>
</body>

</html>
