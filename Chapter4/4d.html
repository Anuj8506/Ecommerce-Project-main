<!DOCTYPE html>
<html>

<head>
    <title>4D</title>
</head>
<style>
    .input{
        color: black;
        padding: 10px 15px;
        margin: 5px;
        width: 250px;
        border-radius: 5px;
    }
    .input-button{
        display: flex;
        flex-direction: column;
    }
    .text{
        background-color: rgb(0,123,255);
        color: white;
        padding: 10px 10px;
        font-size: 10px;
        margin: 5px 5px;
        border-radius: 5px;
    }
    
</style>

<body>
    <div class="js-Container"></div>


    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script> 
    <script type="text/babel">
        function App() {
            const [showPassword, setShowPassword] = React.useState(false);

            function toggleShowPassword() {
                setShowPassword(!showPassword);
            }
           
            return (
                <>  
                    <h2>Hello, Welcome to my Website</h2> 
                    <div className= 'input-button'>
                        <input
                            className = 'input'
                            placeholder = ' Email '
                        />  
                        <div>
                            <input
                                className = 'input'
                                placeholder = ' Password '
                                type={showPassword ? 'text' : 'password'}
                            />
                            <button onClick = { toggleShowPassword }>{showPassword ? 'Hide' : 'Show'}</button>
                        </div> 
                    </div>
                    <button className = 'text'>Login</button>
                    <button className = 'text'>Sign up</button>             
                </>
            );
        }

        const box = document.querySelector('.js-Container');
        ReactDOM.createRoot(box).render(<App />);
    </script>
</body>

</html>
